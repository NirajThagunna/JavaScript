<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>innerText DOM</title>
</head>
<body>
    
    <form>
        <input type="password" id="pass" onkeyup="validate()">
        <span id="msgHere"></span>
    </form>

    <script>
        validate = () => {
            let msg;
            let pass = document.getElementById('pass').value;
            if (pass.length > 5) {
                msg = "good";
            }
            else {
                msg = "weak";
            }
            document.getElementById('msgHere').innerText = msg;
        };
    </script>
</body>
</html>
