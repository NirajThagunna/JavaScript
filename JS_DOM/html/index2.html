<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>innerHTML Property</title>
</head>
<body>
    
    <button onclick="showCommentForm()">Comment</button>
    <div id="myLocation"></div>

    <script>
        let flag = true;
        showCommentForm = () => {
            let data = "Name : <input type='text' name='name'> <br/>Comment : <br/> <textarea rows='5' cols='80'></textarea><br><input type='submit' value='Post Comment>";
            
            if (flag) {
                document.getElementById('myLocation').innerHTML = data;
                flag = false;
            }
            else {
                document.getElementById('myLocation').innerHTML = "";
                flag = true;
            }
        };
    </script>
</body>
</html>
